<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunomono Delivery - Sabor e Qualidade</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        
        /* Capa de Entrada */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('banner.jpg'); 
            background-size: cover; background-position: center; text-align: center; padding: 20px;
        }
        .hero h1 { font-size: 3em; margin-bottom: 20px; }
        .hero-btn { background: #e60000; padding: 15px 40px; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.2em; }

        /* Cardápio */
        .header { padding: 30px; text-align: center; background: #1a1a1a; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .card { background: #1a1a1a; margin-bottom: 15px; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #333; }
        .card img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
        .info { flex-grow: 1; }
        .price { color: #25d366; font-weight: bold; }
        .btn { background: #e60000; color: white; padding: 8px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 5px; font-size: 0.9em; }
        
        /* Mapa e Rodapé */
        .mapa { width: 100%; height: 250px; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .footer-cta { position: fixed; bottom: 0; width: 100%; background: #e60000; padding: 20px; text-align: center; font-weight: bold; text-decoration: none; color: white; z-index: 1000; }
    </style>
</head>
<body>

<!-- Capa de Entrada -->
<section class="hero">
    <h1>M.O Sunomono</h1>
    <p>O melhor sabor japonês de Osasco.</p>
    <br>
    <a href="#cardapio" class="hero-btn">Ver Cardápio</a>
</section>

<!-- Cardápio -->
<header class="header" id="cardapio">
    <h1>Cardápio Sunomono</h1>
</header>

<div class="container" id="lista-sabores"></div>

<!-- Localização -->
<div class="container">
    <h2>Onde estamos (Osasco)</h2>
    <div class="mapa">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3658.077209355743!2d-46.77498332468789!3d-23.530379678818036!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94cf006a88b5770d%3A0x673030369a473a2!2sOsasco%2C%20SP!5e0!3m2!1spt-PT!2sbr!4v1719266000000!5m2!1spt-PT!2sbr" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>
</div>

<a href="https://wa.me/5511942038103" class="footer-cta">PEDIR PELO WHATSAPP</a>

<script>
    const sabores = [
        { nome: "Tradicional", preco: "15,00", img: "sunomono.jpg" },
        { nome: "Salmão", preco: "28,00", img: "salmao.jpg" },
        { nome: "Kani", preco: "20,00", img: "kani.jpg" },
        { nome: "Polvo e Camarão", preco: "35,00", img: "mar.jpg" },
        { nome: "Spicy (Apimentado)", preco: "18,00", img: "spicy.jpg" },
        { nome: "Tropical Manga", preco: "19,00", img: "manga.jpg" },
        { nome: "Crocante (Amendoim)", preco: "17,00", img: "crocante.jpg" },
        { nome: "Shimeji", preco: "22,00", img: "shimeji.jpg" },
        { nome: "Atum", preco: "26,00", img: "atum.jpg" },
        { nome: "Supreme", preco: "40,00", img: "supreme.jpg" }
    ];

    const container = document.getElementById('lista-sabores');
    
    sabores.forEach(sabor => {
        container.innerHTML += `
            <div class="card">
                <img src="${sabor.img}" alt="${sabor.nome}">
                <div class="info">
                    <h3>${sabor.nome}</h3>
                    <p class="price">R$ ${sabor.preco}</p>
                    <a href="https://wa.me/5511942038103?text=Quero pedir o Sunomono ${sabor.nome}" class="btn">Pedir no WhatsApp</a>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
